<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Page not found — Lyvorian Studio</title>
<meta name="robots" content="noindex"/>
<meta name="theme-color" content="#f2e8d5"/>
<link rel="icon" type="image/png" href="/assets/favicon.png"/>
<style>
  @font-face{font-family:'Fraunces';font-style:normal;font-weight:300 700;font-display:swap;
    src:url('/assets/fonts/Fraunces-var.woff2') format('woff2')}
  @font-face{font-family:'Work Sans';font-style:normal;font-weight:300 700;font-display:swap;
    src:url('/assets/fonts/WorkSans-var.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:300 700;font-display:swap;
    src:url('/assets/fonts/JetBrainsMono-var.woff2') format('woff2')}
  :root{--bg:#f2e8d5;--text:#2a2013;--muted:#6b5a3e;--muted2:#8c7a5c;
    --gold:#a97a1f;--gold-bright:#c98f22;--line:rgba(120,86,32,.18)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse 60% 45% at 50% -10%, rgba(169,122,31,.12), transparent 60%),var(--bg);
    color:var(--text);font-family:'Work Sans',system-ui,sans-serif;text-align:center;padding:24px}
  .mark{width:64px;height:64px;border-radius:16px;margin-bottom:26px;
    border:1px solid var(--line);box-shadow:0 12px 30px -14px rgba(42,32,19,.4);
    animation:float 4s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .code{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:3px;color:var(--gold);margin-bottom:10px}
  h1{font-family:'Fraunces',serif;font-weight:540;font-size:clamp(30px,6vw,46px);margin:0 0 14px;letter-spacing:-1px}
  p{color:var(--muted);max-width:400px;margin:0 auto 34px;line-height:1.7}
  a.btn{display:inline-flex;align-items:center;gap:9px;padding:13px 26px;border-radius:11px;
    font-size:15px;font-weight:600;text-decoration:none;color:#1a1206;
    background:linear-gradient(160deg,var(--gold-bright),var(--gold));
    box-shadow:0 10px 30px -10px rgba(169,122,31,.55);
    transition:transform .25s cubic-bezier(.16,.8,.28,1),box-shadow .25s}
  a.btn:hover{transform:translateY(-3px);box-shadow:0 16px 38px -10px rgba(169,122,31,.7)}
</style>
</head>
<body>
<div>
  <img class="mark" src="/assets/icon-beige-512.png" alt="Lyvorian Studio"/>
  <div class="code">ERROR 404</div>
  <h1>This page isn't built yet.</h1>
  <p>One product at a time — and this page isn't one of them. The link may be old or mistyped.</p>
  <a class="btn" href="/">Back to the studio</a>
</div>
</body>
</html>
